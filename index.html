<!DOCTYPE html>
<html>
<head>
    <title>DeFi Monitoring Dashboard</title>
    <link rel="stylesheet" href="style.css">

    <!-- Premium Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <h1>🚀 Algorand DeFi Monitoring Dashboard</h1>

    <!-- 🔍 Search -->
    <input type="text" id="search" placeholder="Search wallet..." />

    <!-- 📊 Stats -->
    <div id="stats">
        <p>Total Txns: <span id="totalTxns">0</span></p>
        <p>Alerts: <span id="totalAlerts">0</span></p>
    </div>

    <!-- 📈 Chart -->
    <div class="chart-container">
        <canvas id="txnChart"></canvas>
    </div>

    <!-- 💳 Transactions -->
    <div id="transactions"></div>

    <script src="script.js"></script>
</body>
</html>
